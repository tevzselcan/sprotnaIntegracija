name: 29922_deploy

on:
  workflow_run:
    workflows: ["29922_test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Download artifact (napaka.txt)
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Preveri napako
        run: |
          if [ -s napaka.txt ]; then
            echo "Napaka obstaja - deploy se prekine"
            cat napaka.txt
            exit 1
          fi

      - name: Login v DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/moja-aplikacija:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/moja-aplikacija:latest
